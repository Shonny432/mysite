<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">

  <!-- LEFT EAR -->
  <rect x="7" y="0" width="4" height="9" fill="#C47010"/>
  <rect x="8" y="0" width="2" height="9" fill="#EE9020"/>
  <rect x="9" y="1" width="1" height="7" fill="#FFCC70"/>

  <!-- RIGHT EAR -->
  <rect x="21" y="0" width="4" height="9" fill="#C47010"/>
  <rect x="22" y="0" width="2" height="9" fill="#EE9020"/>
  <rect x="22" y="1" width="1" height="7" fill="#FFCC70"/>

  <!-- BODY: dark border shadow -->
  <rect x="2" y="7" width="28" height="24" fill="#3A3A3A"/>
  <!-- BODY: gray fill upper (eyes area) -->
  <rect x="3" y="8" width="26" height="16" fill="#909090"/>
  <!-- BODY: top highlight -->
  <rect x="3" y="8" width="26" height="1" fill="#CCCCCC"/>
  <!-- BODY: left edge highlight -->
  <rect x="3" y="9" width="1" height="15" fill="#B0B0B0"/>

  <!-- LEFT EYE: dark ring -->
  <rect x="3" y="9" width="9" height="9" fill="#0A0A0A"/>
  <!-- LEFT EYE: gold fill -->
  <rect x="4" y="10" width="7" height="7" fill="#DDAA00"/>
  <!-- LEFT EYE: amber ring -->
  <rect x="5" y="11" width="5" height="5" fill="#BB8800"/>
  <!-- LEFT EYE: gold center -->
  <rect x="6" y="12" width="3" height="3" fill="#DDAA00"/>
  <!-- LEFT EYE: pupil -->
  <rect x="7" y="13" width="2" height="2" fill="#080808"/>
  <!-- LEFT EYE: highlight -->
  <rect x="4" y="10" width="2" height="2" fill="#FFFFCC"/>

  <!-- RIGHT EYE: dark ring -->
  <rect x="20" y="9" width="9" height="9" fill="#0A0A0A"/>
  <!-- RIGHT EYE: gold fill -->
  <rect x="21" y="10" width="7" height="7" fill="#DDAA00"/>
  <!-- RIGHT EYE: amber ring -->
  <rect x="22" y="11" width="5" height="5" fill="#BB8800"/>
  <!-- RIGHT EYE: gold center -->
  <rect x="23" y="12" width="3" height="3" fill="#DDAA00"/>
  <!-- RIGHT EYE: pupil -->
  <rect x="24" y="13" width="2" height="2" fill="#080808"/>
  <!-- RIGHT EYE: highlight -->
  <rect x="21" y="10" width="2" height="2" fill="#FFFFCC"/>

  <!-- BAT/ANGRY BROW: center line (V tip pointing up) -->
  <rect x="14" y="10" width="4" height="1" fill="#0A0A0A"/>
  <!-- BAT/ANGRY BROW: left arm going down-outward -->
  <rect x="12" y="11" width="3" height="1" fill="#0A0A0A"/>
  <!-- BAT/ANGRY BROW: right arm going down-outward -->
  <rect x="17" y="11" width="3" height="1" fill="#0A0A0A"/>
  <!-- BAT/ANGRY BROW: outer tips -->
  <rect x="12" y="12" width="2" height="1" fill="#0A0A0A"/>
  <rect x="18" y="12" width="2" height="1" fill="#0A0A0A"/>

  <!-- NOSE (below brows) -->
  <rect x="14" y="15" width="4" height="1" fill="#0A0A0A"/>
  <rect x="15" y="14" width="2" height="3" fill="#0A0A0A"/>

  <!-- BODY: lower section (below eyes) -->
  <rect x="3" y="18" width="26" height="5" fill="#909090"/>
  <!-- BODY: shadow line before strip -->
  <rect x="3" y="23" width="26" height="1" fill="#606060"/>

  <!-- BOTTOM STRIP: dark base -->
  <rect x="2" y="24" width="28" height="8" fill="#181818"/>

  <!-- LEFT SLOT -->
  <rect x="5" y="25" width="8" height="6" fill="#2E2E2E"/>
  <rect x="5" y="26" width="8" height="2" fill="#E8E8E8"/>
  <rect x="5" y="28" width="8" height="1" fill="#888888"/>

  <!-- RIGHT SLOT -->
  <rect x="19" y="25" width="8" height="6" fill="#2E2E2E"/>
  <rect x="19" y="26" width="8" height="2" fill="#E8E8E8"/>
  <rect x="19" y="28" width="8" height="1" fill="#888888"/>

</svg>
